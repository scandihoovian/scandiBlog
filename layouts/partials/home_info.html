<div style="text-align:center; padding: 1.5rem 0;">
  <div id="sober-days" style="font-size: 72px; font-weight: 500; line-height: 1;"></div>
  <div style="font-size: 16px; color: gray; margin-top: 8px;">days sober</div>
  <div style="font-size: 13px; color: gray; margin-top: 6px;">since September 8, 2021</div>
</div>
<script>
  const start = new Date('2021-09-08T00:00:00');
  const days = Math.floor((new Date() - start) / 86400000);
  document.getElementById('sober-days').textContent = days.toLocaleString();
</script>
